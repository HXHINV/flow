<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diana × BTS — Una Historia Pixel</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root { --purple:#7b2d8b; --gold:#ffd166; --pink:#f72585; --cyan:#4cc9f0; --dark:#030310; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body {
    background:var(--dark);
    width:100%; height:100%;
    min-height:100dvh;
    overflow:hidden;
    font-family:'Press Start 2P',monospace;
    touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }
  #game-wrap {
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:4px;
    padding:4px;
  }
  /* UI bar scales with vw */
  #ui-bar {
    display:flex; align-items:center; justify-content:space-between;
    width:100%; max-width:100%;
    padding:2px 4px;
    flex-shrink:0;
  }
  #chapter-tag {
    color:#c77dff; font-size:clamp(5px,2.5vw,9px);
    letter-spacing:1px; text-shadow:0 0 6px #c77dff;
  }
  #bias-wrap { display:flex; align-items:center; gap:3px; }
  #bias-label { color:var(--pink); font-size:clamp(4px,1.8vw,7px); }
  #bias-bar-outer {
    width:clamp(40px,15vw,80px); height:6px;
    border:1px solid var(--pink); background:#1a0010;
    box-shadow:0 0 6px #f7258544; overflow:hidden;
  }
  #bias-bar-inner {
    height:100%;
    background:linear-gradient(90deg,#f72585,#ff6eb0);
    width:0%; transition:width 0.8s ease;
    box-shadow:0 0 8px #f72585;
  }
  #bias-icon { color:var(--pink); font-size:clamp(8px,3.5vw,13px); }

  /* Canvas container — scales to fit screen */
  #outer {
    position:relative;
    flex-shrink:0;
    /* JS sets --cw and --ch */
    width:var(--cw); height:var(--ch);
  }
  #outer::before {
    content:''; position:absolute; inset:-3px;
    border:2px solid var(--gold);
    box-shadow:0 0 0 1px #000,0 0 16px #ffd16655,0 0 40px #7b2d8b33;
    pointer-events:none; z-index:2;
  }
  #outer::after {
    content:'♛ ARMY ♛'; position:absolute;
    top:-14px; left:50%; transform:translateX(-50%);
    color:var(--gold); font-size:clamp(5px,2vw,8px);
    letter-spacing:2px; background:var(--dark); padding:0 5px;
    text-shadow:0 0 8px var(--gold); z-index:3; white-space:nowrap;
  }
  canvas {
    display:block;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
    cursor:pointer;
    /* canvas internal size is 480x320 — JS scales via transform */
    transform-origin:top left;
  }
  #crt {
    position:absolute; inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 3px);
    pointer-events:none; z-index:1;
  }
  #vig {
    position:absolute; inset:0;
    background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.7) 100%);
    pointer-events:none; z-index:1;
  }
  #chapter-overlay {
    position:absolute; inset:0; z-index:4;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    pointer-events:none; opacity:0; transition:opacity 0.3s;
    background:#00000099;
  }
  #chapter-overlay.show { opacity:1; }
  #chapter-title {
    color:var(--gold); font-size:clamp(7px,3vw,13px);
    text-shadow:0 0 16px var(--gold); letter-spacing:3px; text-align:center;
  }
  #chapter-sub { color:#c77dff; font-size:clamp(5px,2vw,8px); margin-top:6px; letter-spacing:2px; }

  #hint {
    color:var(--cyan); font-size:clamp(4px,2vw,7px);
    letter-spacing:1px; flex-shrink:0;
    animation:blink 1.1s ease-in-out infinite; text-align:center;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.1}}
</style>
</head>
<body>
<div id="game-wrap">
<div id="ui-bar">
  <div id="chapter-tag">CAP. <span id="cap-num">00</span></div>
  <div id="bias-wrap">
    <div id="bias-label">BIAS-O-METER</div>
    <div id="bias-bar-outer"><div id="bias-bar-inner"></div></div>
    <div id="bias-icon">💜</div>
  </div>
</div>

<div id="outer">
  <canvas id="c" width="560" height="340"></canvas>
  <div id="crt"></div>
  <div id="vig"></div>
  <div id="chapter-overlay">
    <div id="chapter-title"></div>
    <div id="chapter-sub"></div>
  </div>
</div>
<div id="hint">▶ CLICK / TAP PARA CONTINUAR</div>
</div>

<script>
(() => {
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const P = 3;        // CSS px per game pixel (retina-like)
const GW = 187;     // game width  (560/3 ≈ 187)
const GH = 114;     // game height (340/3 ≈ 113)

let frame = 0;
let fadeAlpha = 0;  // 0=visible, 1=black (for transitions)
let isFading = false;
let pendingAdvance = null;
let biasValue = 0;
let chapterShowTimer = 0;
let biasAlertTimer = 0;
let typewriterIdx = 0;
let typewriterFull = '';
let typewriterDone = false;
const TW_SPEED = 2; // chars per frame

// ── PARTICLES ──────────────────────────────────────────────────────
const particles = [];
function spawnParticle(x, y, type='heart'){
  particles.push({ x, y, vx:(Math.random()-0.5)*0.8, vy:-(Math.random()*1.2+0.4),
    life:1, type, rot:Math.random()*Math.PI*2, scale:0.5+Math.random()*0.8 });
}
function spawnBurst(x, y, n=12, type='heart'){
  for(let i=0;i<n;i++) spawnParticle(x+(Math.random()-0.5)*20, y+(Math.random()-0.5)*10, type);
}
function spawnRain(){
  if(Math.random()<0.15) spawnParticle(Math.random()*GW, 0, 'star');
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.02; p.life-=0.012;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles(){
  particles.forEach(p=>{
    const a=Math.max(0,p.life);
    ctx.globalAlpha=a;
    const px=Math.round(p.x), py=Math.round(p.y);
    if(p.type==='heart'){
      ctx.fillStyle='#f72585';
      r(px-1,py,3,2,'#f72585'); r(px,py-1,1,1,'#f72585');
      r(px-2,py-1,1,2,'#f72585'); r(px+2,py-1,1,2,'#f72585');
    } else if(p.type==='star'){
      ctx.fillStyle='#ffd166'; r(px,py,1,1,'#ffd166');
    } else if(p.type==='note'){
      ctx.fillStyle='#4cc9f0'; r(px,py,2,2,'#4cc9f0'); r(px+2,py-2,1,3,'#4cc9f0');
    } else if(p.type==='purple'){
      r(px,py,2,2,'#c77dff');
    }
  });
  ctx.globalAlpha=1;
}

// ── AUDIO ─────────────────────────────────────────────────────────
let AC;
const ac=()=>{ if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)(); return AC; };
const tone=(f,dur,type='square',vol=0.05,delay=0)=>{
  const a=ac(), o=a.createOscillator(), g=a.createGain();
  o.connect(g); g.connect(a.destination);
  o.type=type; o.frequency.value=f;
  g.gain.setValueAtTime(0,a.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol,a.currentTime+delay+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+delay+dur);
  o.start(a.currentTime+delay); o.stop(a.currentTime+delay+dur+0.05);
};
const sfxClick=()=>{ tone(440,0.06); tone(660,0.08,undefined,undefined,0.06); };
const sfxBias=()=>{
  [392,494,587,784,988,1175,1568].forEach((f,i)=>tone(f,0.18,'triangle',0.08,i*0.08));
  setTimeout(()=>{ spawnBurst(GW/2,40,20,'heart'); spawnBurst(GW/2,40,15,'purple'); },200);
};
const sfxMeet=()=>{ [523,659,784].forEach((f,i)=>tone(f,0.14,'triangle',0.07,i*0.09)); };
const sfxTypewriter=()=>{ if(frame%3===0) tone(800+Math.random()*200,0.03,'square',0.015); };
const sfxEnding=()=>{
  [523,587,659,784,880,1047,1175,1319].forEach((f,i)=>tone(f,0.22,'triangle',0.09,i*0.1));
  spawnBurst(GW/2,30,30,'purple'); spawnBurst(GW/2,30,20,'heart'); spawnBurst(GW/2,30,20,'star');
};

// ── DRAW HELPERS ──────────────────────────────────────────────────
const r=(x,y,w,h,c)=>{ ctx.fillStyle=c; ctx.fillRect(x*P,y*P,w*P,h*P); };
const d=(x,y,c)=>r(x,y,1,1,c);
const line=(x1,y1,x2,y2,c)=>{
  ctx.strokeStyle=c; ctx.lineWidth=P;
  ctx.beginPath(); ctx.moveTo(x1*P+P/2,y1*P+P/2); ctx.lineTo(x2*P+P/2,y2*P+P/2); ctx.stroke();
};

// Deterministic pseudo-random
function prng(seed){ return (seed=seed*1664525+1013904223)&0xffffffff, (seed>>>0)/0xffffffff; }
function drawStars(n,seed,maxY=55){
  let s=seed;
  for(let i=0;i<n;i++){
    s=(s*1664525+1013904223)&0xffffffff; const sx=(s>>>0)%GW;
    s=(s*1664525+1013904223)&0xffffffff; const sy=(s>>>0)%maxY;
    const tw=frame%120; const twinkle=Math.sin(tw*0.1+i*0.7)>0.6?'#ffffff':'#c8c8ff';
    d(sx,sy,i%3===0?'#ffd166':i%4===0?'#f72585':twinkle);
  }
}

// ══════════════════════════════════════════════════════════════════
//  BACKGROUNDS
// ══════════════════════════════════════════════════════════════════

function bgTitle(){
  r(0,0,GW,GH,'#040412');
  // Nebula gradient streaks
  for(let i=0;i<5;i++){
    const x=(i*41+20)%GW, bw=25, by=10+i*12;
    for(let xi=0;xi<bw;xi++){
      const a=Math.sin((xi/bw)*Math.PI);
      ctx.fillStyle=`rgba(123,45,139,${a*0.15})`; ctx.fillRect((x+xi)*P,by*P,P,35*P);
    }
  }
  drawStars(70,12345,75);
  // Horizon
  r(0,68,GW,2,'#3d0d6e'); r(0,70,GW,1,'#5a1a9a');
  // Retro 3D grid floor
  r(0,71,GW,GH-71,'#08082a');
  for(let x=0;x<GW;x+=10) { const alpha=Math.floor(0x20+x*0.5).toString(16).padStart(2,'0'); d(x,71,'#2a2a6a'+alpha); line(x,71,x,GH,'#2a2a6a'); }
  for(let y=71;y<GH;y+=6) r(0,y,GW,1,'#1e1e55');
  // Glow pulse
  const pulse=Math.sin(frame*0.04)*0.3+0.7;
  ctx.fillStyle=`rgba(247,37,133,${0.06*pulse})`; ctx.fillRect(0,0,GW*P,GH*P);
  // Title text
  ctx.textAlign='center';
  ctx.fillStyle='#ffd166'; ctx.shadowColor='#ffd166'; ctx.shadowBlur=15*pulse;
  ctx.font=`${9*P}px 'Press Start 2P'`; ctx.fillText('DIANA',GW/2*P,24*P);
  ctx.fillStyle='#c77dff'; ctx.shadowColor='#c77dff'; ctx.shadowBlur=10*pulse;
  ctx.font=`${5*P}px 'Press Start 2P'`; ctx.fillText('×',GW/2*P,36*P);
  ctx.fillStyle='#f72585'; ctx.shadowColor='#f72585'; ctx.shadowBlur=15*pulse;
  ctx.font=`${9*P}px 'Press Start 2P'`; ctx.fillText('BTS',GW/2*P,49*P);
  ctx.shadowBlur=0;
  ctx.fillStyle='#a0a0d0'; ctx.font=`${3*P}px 'Press Start 2P'`;
  ctx.fillText('una historia pixelada 🌸',GW/2*P,60*P);
  // Blink start
  if(frame%100<60){
    ctx.fillStyle='#ffd166'; ctx.font=`${3*P}px 'Press Start 2P'`;
    ctx.fillText('▶  CLICK PARA COMENZAR  ◀',GW/2*P,78*P);
  }
}

function bgColombia(){
  // Sky gradient
  for(let y=0;y<55;y++){ const l=72-y*0.5; r(0,y,GW,1,`hsl(197,${60-y*0.3}%,${l}%)`); }
  // Animated clouds
  const cx=frame*0.12; [(30+cx)%GW,((GW/2+cx*0.7)%GW),(110+cx*0.5)%GW].forEach((x,i)=>{
    const y=8+i*5, w=18+i*4;
    r(x,y,w,3,'#ffffffcc'); r(x+3,y-2,w-6,2,'#ffffffcc'); r(x+2,y+3,w-4,2,'#ffffffee');
  });
  // Sun
  r(GW-20,5,10,10,'#ffd700'); r(GW-18,3,6,14,'#ffd700'); r(GW-23,8,16,4,'#ffd700');
  // Mountains
  [[0,18,'#1a5a3a'],[22,14,'#2d6a4f'],[44,20,'#155230'],[66,16,'#204e40'],[88,22,'#1a5a3a']].forEach(([mx,mh,mc])=>{
    for(let ry=0;ry<mh;ry++){ const mw=Math.round((ry/mh)*(mh/2))+2; r(mx+mh/2-mw/2,55-ry,mw,1,mc); }
  });
  // Ground
  r(0,55,GW,GH-55,'#4a7c59'); r(0,55,GW,4,'#2d6a4f');
  // Background buildings
  [[8,32,15,23,'#c8a060'],[26,28,12,27,'#d4a870'],[42,35,10,20,'#b89050'],[130,31,13,24,'#c09858'],[147,36,9,19,'#d4b070']].forEach(([bx,by,bw,bh,bc])=>{
    r(bx,by,bw,bh,bc);
    for(let wy=by+2;wy<by+bh-2;wy+=5) for(let wx=bx+2;wx<bx+bw-2;wx+=4){
      const lit=Math.sin(frame*0.03+wx*0.4+wy*0.2)>0.3;
      d(wx,wy,lit?'#ffd16688':'#00000044');
    }
  });
  // Road
  r(0,75,GW,12,'#7a7a7a'); r(0,79,GW,2,'#8a8a8a');
  for(let x=0;x<GW;x+=14){ const dashX=(x+frame%14*0.8)%GW; r(dashX,80,7,1,'#ffd166'); }
  // Colombia flag
  r(GW-25,2,18,3,'#fcd116'); r(GW-25,5,18,2,'#003893'); r(GW-25,7,18,2,'#ce1126');
  r(GW-27,0,2,12,'#8a8a7a');
}

function bgSeoul(){
  for(let y=0;y<55;y++) r(0,y,GW,1,`hsl(220,${40-y*0.3}%,${55-y*0.4}%)`);
  drawStars(30,88888,50);
  // City skyline
  [[10,18,12,37],[25,10,10,45],[40,22,14,33],[58,14,10,41],[78,8,18,47],[100,16,12,39],[116,12,14,43],[134,20,10,35],[148,16,12,39]].forEach(([bx,by,bw,bh])=>{
    const hue=220+Math.sin(bx*0.1)*20;
    r(bx,by,bw,bh,`hsl(${hue},30%,${20+by*0.3}%)`);
    // Windows
    for(let wy=by+2;wy<by+bh-3;wy+=4) for(let wx=bx+1;wx<bx+bw-1;wx+=4){
      const isOn=Math.sin(frame*0.02+wx+wy*2)>0.1;
      if(isOn) r(wx,wy,2,2,'#ffd16680');
    }
  });
  // Ground
  r(0,55,GW,GH-55,'#1a1a2a'); r(0,55,GW,2,'#2a2a3a');
  // Street reflections
  for(let x=0;x<GW;x+=18){
    for(let y=57;y<GH;y+=2){
      const a=Math.sin(x*0.2+frame*0.04)*0.3+0.1;
      ctx.fillStyle=`rgba(100,140,255,${a*0.2})`; ctx.fillRect(x*P,y*P,P*8,P);
    }
  }
  // HYBE sign
  r(65,5,60,50,'#1a1a2e'); r(65,5,60,4,'#2a2a3e'); r(65,5,3,50,'#2a2a3e'); r(122,5,3,50,'#2a2a3e');
  for(let wy=10;wy<50;wy+=8) for(let wx=70;wx<120;wx+=11) r(wx,wy,7,5,'#3355aa66');
  ctx.fillStyle='#ffd166'; ctx.font=`${5*P}px 'Press Start 2P'`; ctx.textAlign='center';
  ctx.fillText('HYBE',95*P,28*P);
  ctx.fillStyle='#c8c8ff'; ctx.font=`${2*P}px 'Press Start 2P'`;
  ctx.fillText('LABELS',95*P,33*P);
  // Street lights
  [20,GW-20].forEach(lx=>{ r(lx,35,2,25,'#5a5a6a'); r(lx-4,33,10,2,'#5a5a6a'); d(lx-2,34,'#ffd16680'); d(lx+3,34,'#ffd16680'); });
}

function bgStage(){
  r(0,0,GW,GH,'#040412');
  drawStars(8,55555,40);
  // Giant light beams
  const beams=[[15,'#ff000018'],[38,'#ffd16620'],[62,'#00ff8815'],[88,'#4cc9f020'],[114,'#f7258518'],[140,'#c77dff20'],[163,'#ffd16618']];
  beams.forEach(([bx,bc])=>{
    ctx.fillStyle=bc;
    ctx.beginPath(); ctx.moveTo(bx*P,0); ctx.lineTo((bx-22)*P,75*P); ctx.lineTo((bx+22)*P,75*P); ctx.closePath(); ctx.fill();
  });
  // Stage
  r(0,68,GW,GH-68,'#1a0a3a'); r(0,66,GW,3,'#2d1a50'); r(0,66,GW,1,'#7a3a9a');
  // Lights bar
  r(0,0,GW,5,'#12101c');
  for(let x=2;x<GW;x+=9){
    const on=Math.sin(frame*0.08+x*0.2)>0.4;
    d(x,2,on?'#ffd166':'#3a3a4a'); d(x+4,3,on?'#f72585':'#3a3a4a'); d(x+2,1,on?'#4cc9f0':'#3a3a4a');
  }
  // Screen backdrop
  r(50,8,90,45,'#0d0d1e'); r(52,10,86,41,'#141428');
  ctx.fillStyle='#c77dff22'; ctx.fillRect(52*P,10*P,86*P,41*P);
  // Floor sparkle
  for(let x=0;x<GW;x+=3){
    const sh=Math.sin(frame*0.1+x*0.3)*2; if(sh>1.5) d(x,74,'#ffd16655');
  }
}

function bgStudio(){
  r(0,0,GW,GH,'#0e0c18');
  // Acoustic panels gradient
  for(let x=0;x<GW;x+=10){ r(x,0,9,68,(x/10)%2===0?'#14101e':'#181420'); }
  // Mixing board
  r(10,55,120,20,'#12121e'); r(12,57,116,14,'#1e1e30');
  for(let x=15;x<125;x+=6){
    const h=Math.abs(Math.sin((frame*0.05+x*0.3)))*8+1;
    r(x,65-h,3,h,x%3===0?'#00ff8888':x%3===1?'#ffd16688':'#4cc9f088');
    r(x,57,3,6,'#2a2a3a'); d(x+1,57+Math.round(Math.random()*3),'#4444aa');
  }
  // Monitor
  r(138,30,44,36,'#0a0a14'); r(140,32,40,32,'#001830');
  for(let x=0;x<38;x++){ const h=Math.round(Math.abs(Math.sin((frame*0.08+x*0.5)))*10); r(142+x,60-h,1,h,'#00ff88'); }
  ctx.fillStyle='#00ff88'; ctx.font=`${2*P}px 'Press Start 2P'`; ctx.textAlign='left';
  ctx.fillText('● REC',141*P,34*P); ctx.fillStyle='#f7258588'; ctx.fillText('AGUST D',141*P,40*P);
  // Chair
  r(150,65,12,10,'#2a1a1a'); r(153,58,6,8,'#3a2a2a'); r(155,58,1,2,'#5a4a4a');
}

function bgDance(){
  r(0,0,GW,GH,'#0a0a18');
  // Mirror wall - reflections
  r(0,0,GW,62,'#0d1020');
  for(let x=0;x<GW;x+=15) r(x,0,1,62,'#1a1a30');
  for(let x=8;x<GW;x+=22){ const sh=Math.sin(frame*0.06+x*0.1)*4+8; r(x,0,sh,62,'#ffffff08'); }
  // Barre
  r(0,40,GW,2,'#9a7a5a'); r(0,38,GW,1,'#b09070');
  for(let x=0;x<GW;x+=18) r(x,38,2,10,'#7a5a3a');
  // Wood floor
  r(0,62,GW,GH-62,'#c8a060');
  for(let x=0;x<GW;x+=20) r(x,62,1,GH-62,'#b09050');
  r(0,62,GW,1,'#a07a40');
  // Stage lights on floor
  for(let x=0;x<GW;x+=28){ ctx.fillStyle='rgba(200,160,80,0.12)'; ctx.fillRect(x*P,62*P,P*20,P*5); }
}

function bgRooftop(){
  // Seoul night sky
  r(0,0,GW,GH,'#050518');
  drawStars(80,99999,60);
  // Moon
  r(GW-25,5,14,14,'#fffacd'); r(GW-23,4,10,1,'#fffacd'); r(GW-25,18,14,1,'#fffacd');
  d(GW-19,9,'#f0e890'); // moon crater
  // City silhouette far
  for(let x=0;x<GW;x+=12){ const bh=8+((x*7+3)%12); r(x,60-bh,10,bh,'#0a0820'); }
  // Rooftop floor
  r(0,60,GW,GH-60,'#1a1628');
  r(0,60,GW,3,'#2a2038');
  // Railing
  r(0,52,GW,2,'#3a3050'); for(let x=2;x<GW;x+=8) r(x,52,2,8,'#3a3050');
  // City lights below

function getYOffset(id){ return Math.sin(frame*0.07 + id*1.2) * 0.8; }

function diana(bx,by,mood=1,id=0){

    [x-3, x+2].forEach(ex=>{

  // ── AFRO (voluminous, rich, defined curls) ──
  const h1='#3a1808', h2='#6a3018', h3='#8a4828', h4='#1e0a04', hl='#c07050';

  r(x-11,y-40,23,6,h1);
  r(x-12,y-38,5,10,h1); r(x+8,y-38,5,10,h1); // side volume

   [-9,y-44],[-5,y-46],[1,y-47],[5,y-46],[9,y-44],

   [-8,y-43],[3,y-45],[8,y-43],

  d(x-6,y-30,'#ffd166'); d(x-7,y-29,'#ffd166'); d(x-7,y-28,'#ffd166');
  d(x-7,y-27,'#ffd166'); d(x-6,y-26,'#ffd166');
  d(x-7,y-28,'#fff8c0'); // hoop glint
  // Right hoop

// ── PORTRAIT for dialog box ────────────────────────────────────────
function drawPortrait(name, boxX, boxY, boxH){
  const px=boxX+1, py=boxY+1, pw=22, ph=boxH-2;
  r(px,py,pw,ph,'#0a0818');
  ctx.strokeStyle='#2a2a4a'; ctx.lineWidth=P; ctx.strokeRect(px*P,py*P,pw*P,ph*P);
  const cx=px+pw/2, cy=py+ph*0.65;
  const charMap={
    'DIANA': ()=>diana(cx,cy,1,99),
    'RM': ()=>rm(cx,cy,false,98),
    'JIN': ()=>jin(cx,cy,98),
    'SUGA': ()=>suga(cx,cy,98),
    'J-HOPE': ()=>jhope(cx,cy,98),
    'JIMIN': ()=>jimin(cx,cy,98),
    'V': ()=>tae(cx,cy,98),
    'JUNGKOOK': ()=>jk(cx,cy,98),
    'RM 💜': ()=>rm(cx,cy,true,98),
  };
  if(charMap[name]) charMap[name]();
  else { ctx.fillStyle='#c77dff'; ctx.font=`${3*P}px 'Press Start 2P'`; ctx.textAlign='center'; ctx.fillText('?',cx*P,cy*P); }
  // Name bottom
  r(px,py+ph-7,pw,7,'#0d0a18');
  ctx.fillStyle='#c77dff'; ctx.font=`${2*P}px 'Press Start 2P'`; ctx.textAlign='center';
  ctx.fillText(name.slice(0,5),( px+pw/2)*P,(py+ph-2)*P);
}

// ── DIALOG BOX ────────────────────────────────────────────────────
function drawDialog(speaker, text, color='#ffd166'){
  const bx=2, by=74, bw=GW-4, bh=GH-by-2;
  const hasSp=speaker && speaker!=='';
  // Shadow
  r(bx+1,by+1,bw,bh,'#00000066');
  // Fill
  r(bx,by,bw,bh,'#04031299');
  // Gradient overlay
  ctx.fillStyle='linear-gradient'; // fake
  for(let yi=0;yi<bh;yi++){ ctx.fillStyle=`rgba(0,0,15,${0.4-yi/bh*0.35})`; ctx.fillRect(bx*P,(by+yi)*P,bw*P,P); }
  // Border
  ctx.strokeStyle=color; ctx.lineWidth=P;
  ctx.strokeRect(bx*P+P/2,by*P+P/2,bw*P-P,bh*P-P);
  // Corners
  r(bx,by,3,3,color); r(bx+bw-3,by,3,3,color); r(bx,by+bh-3,3,3,color); r(bx+bw-3,by+bh-3,3,3,color);
  r(bx+1,by+1,1,1,'#000'); r(bx+bw-2,by+1,1,1,'#000'); r(bx+1,by+bh-2,1,1,'#000'); r(bx+bw-2,by+bh-2,1,1,'#000');
  // Portrait area
  const portW=hasSp?24:0;
  if(hasSp) drawPortrait(speaker, bx+1, by+1, bh-2);
  // Speaker tag
  if(hasSp){
    const sw=speaker.length*6+8;
    ctx.fillStyle='#040312'; ctx.fillRect((bx+portW+2)*P,(by-7)*P,sw*P,8*P);
    ctx.strokeStyle=color; ctx.lineWidth=P; ctx.strokeRect((bx+portW+2)*P,(by-7)*P,sw*P,8*P);
    ctx.fillStyle=color; ctx.font=`${3*P}px 'Press Start 2P'`; ctx.textAlign='left';
    ctx.fillText(speaker,(bx+portW+3)*P,(by-1)*P);
  }
  // Typewriter text
  const shown=text.slice(0,typewriterIdx);
  const tx2=bx+portW+5, ty2=by+9, maxW2=(bw-portW-10)*P;
  ctx.fillStyle='#e8e8ff'; ctx.font=`${3*P}px 'Press Start 2P'`; ctx.textAlign='left';
  const words=shown.split(' '); let line2=''; let tl=ty2*P;
  const lh2=9*P;
  for(let i=0;i<words.length;i++){
    const test=line2+(line2?' ':'')+words[i];
    if(ctx.measureText(test).width>maxW2&&line2){ ctx.fillText(line2,tx2*P,tl); line2=words[i]; tl+=lh2; }
    else line2=test;
  }
  if(line2) ctx.fillText(line2,tx2*P,tl);
  // Blink arrow if done
  if(typewriterDone&&frame%70<40){ ctx.fillStyle=color; ctx.font=`${4*P}px 'Press Start 2P'`; ctx.textAlign='right'; ctx.fillText('▶',(bx+bw-3)*P,(by+bh-3)*P); }
}

// ── BIAS ALERT ────────────────────────────────────────────────────
function drawBiasAlert(){
  if(biasAlertTimer<=0) return;
  const t=biasAlertTimer/80;
  ctx.fillStyle=`rgba(247,37,133,${t*0.18})`; ctx.fillRect(0,0,GW*P,GH*P);
  ctx.fillStyle=`rgba(255,214,102,${t})`; ctx.shadowColor='#ffd166'; ctx.shadowBlur=20*t;
  ctx.font=`${7*P}px 'Press Start 2P'`; ctx.textAlign='center';
  ctx.fillText('💜 BIAS ALERT 💜',GW/2*P,45*P);
  ctx.shadowBlur=0;
  ctx.fillStyle=`rgba(255,214,102,${t*0.9})`; ctx.font=`${3*P}px 'Press Start 2P'`;
  ctx.fillText('KIM NAMJOON HA ENTRADO AL CHAT',GW/2*P,58*P);
  biasAlertTimer--;
  if(biasAlertTimer%10<5) spawnParticle(Math.random()*GW,Math.random()*60,'heart');
}

// ══════════════════════════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════════════════════════

let sc=0, dl=0;
function curScene(){ return SCENES[sc]; }
function curDialog(){ return SCENES[sc].dialogs[dl]; }

function startTypewriter(text){
  typewriterFull=text||'';
  typewriterIdx=0;
  typewriterDone=typewriterFull.length===0;
}

function advance(){
  if(isFading) return;
  // If typewriter not done, skip to end
  if(!typewriterDone){ typewriterIdx=typewriterFull.length; typewriterDone=true; return; }
  sfxClick();
  const s=curScene();
  dl++;
  if(dl>=s.dialogs.length){
    // Fade to next scene
    const nextSc=sc+1;
    if(nextSc>=SCENES.length){ return; }
    isFading=true;
    pendingAdvance=()=>{
      sc=nextSc; dl=0;
      const ns=SCENES[sc];
      const nd=ns.dialogs[0];
      startTypewriter(nd.tx||'');
      updateBiasBar(ns.bias||0);
      updateChapterTag(ns.id);
      if(ns.biasAlert){ biasAlertTimer=80; sfxBias(); }
      else if(ns.ending) sfxEnding();
      else sfxMeet();
      showChapterTitle(ns.chapterName,ns.chapterSub);
    };
  } else {
    startTypewriter(curDialog().tx||'');
  }
}

function updateBiasBar(val){
  biasValue=val;
  const bar=document.getElementById('bias-bar-inner');
  bar.style.width=val+'%';
}
function updateChapterTag(id){
  document.getElementById('cap-num').textContent=String(id).padStart(2,'0');
}
function showChapterTitle(title,sub){
  const ov=document.getElementById('chapter-overlay');
  document.getElementById('chapter-title').textContent=title;
  document.getElementById('chapter-sub').textContent=sub;
  ov.classList.add('show');
  setTimeout(()=>ov.classList.remove('show'),1800);
}

// ── RENDER LOOP ────────────────────────────────────────────────────
function render(){
  frame++;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Fade transition
  if(isFading){
    fadeAlpha+=0.06;
    if(fadeAlpha>=1){ fadeAlpha=1; if(pendingAdvance){ pendingAdvance(); pendingAdvance=null; isFading=false; } }
  } else if(fadeAlpha>0){
    fadeAlpha=Math.max(0,fadeAlpha-0.07);
    if(fadeAlpha===0) isFading=false;
  }

  const s=curScene(); const dg=curDialog();

  // Background
  s.bg();

  // Typewriter update
  if(!typewriterDone){
    typewriterIdx=Math.min(typewriterFull.length, typewriterIdx+TW_SPEED);
    if(typewriterIdx>=typewriterFull.length) typewriterDone=true;
    else sfxTypewriter();
  }

  // Characters
  if(dg && dg.chars){
    dg.chars.forEach(ch=>{ if(ch.fn) ch.fn(ch.x,ch.y); });
  }

  // Rooftop particle rain
  if(sc>=10) spawnRain();
  // RM special sparkles
  if(dg&&dg.rmSpecial&&frame%4<2) spawnParticle(Math.random()*GW,Math.random()*70,'purple');

  // Particles
  updateParticles(); drawParticles();

  // Dialog
  if(dg&&dg.tx){
    const col=dg.sp==='DIANA'?'#ffd166':dg.sp&&dg.sp.startsWith('RM')?'#c77dff':'#4cc9f0';
    drawDialog(dg.sp,dg.tx,col);
  } else if(s.ending){
    // Ending card
    ctx.textAlign='center';
    ctx.fillStyle='#ffd166'; ctx.shadowColor='#ffd166'; ctx.shadowBlur=10;
    ctx.font=`${7*P}px 'Press Start 2P'`; ctx.fillText('WE PURPLE YOU',GW/2*P,55*P);
    ctx.shadowBlur=0;
    ctx.fillStyle='#c77dff'; ctx.font=`${3*P}px 'Press Start 2P'`;
    ctx.fillText('Diana × BTS ♡ 2024',GW/2*P,67*P);
    ctx.fillStyle='#a0a0c8'; ctx.font=`${2*P}px 'Press Start 2P'`;
    ctx.fillText('인연 — inyeon — conexión del alma',GW/2*P,77*P);
    if(frame%80<45){ ctx.fillStyle='#ffd166'; ctx.font=`${3*P}px 'Press Start 2P'`; ctx.fillText('▶ CLICK PARA VOLVER AL INICIO',GW/2*P,108*P); }
    if(frame%4===0) spawnParticle(Math.random()*GW,Math.random()*40,'purple');
    if(frame%6===0) spawnParticle(Math.random()*GW,Math.random()*40,'heart');
  }

  // Bias alert overlay
  drawBiasAlert();

  // Fade overlay
  if(fadeAlpha>0){
    ctx.fillStyle=`rgba(0,0,0,${fadeAlpha})`; ctx.fillRect(0,0,GW*P,GH*P);
  }

  requestAnimationFrame(render);
}

// ── CLICK HANDLER ────────────────────────────────────────────────
function handleClick(){
  if(biasAlertTimer>30){ biasAlertTimer=0; return; } // skip alert
  if(curScene().ending){ // restart
    sc=0; dl=0; updateBiasBar(0); updateChapterTag(0);
    startTypewriter(''); return;
  }
  advance();
}
canvas.addEventListener('click',handleClick);
canvas.addEventListener('touchend',e=>{e.preventDefault();handleClick();});

// ── RESPONSIVE SCALING ──────────────────────────────────────────
function resizeCanvas(){
  const outer = document.getElementById('outer');
  const ui = document.getElementById('ui-bar');
  const hint = document.getElementById('hint');
  const uiH = ui.offsetHeight + hint.offsetHeight + 24;
  const availW = window.innerWidth - 12;
  const availH = window.innerHeight - uiH;
  const scaleW = availW / (GW * P);
  const scaleH = availH / (GH * P);
  const scale = Math.min(scaleW, scaleH);
  const cw = Math.floor(GW * P * scale);
  const ch = Math.floor(GH * P * scale);
  outer.style.setProperty('--cw', cw + 'px');
  outer.style.setProperty('--ch', ch + 'px');
  canvas.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', ()=>{ setTimeout(resizeCanvas, 200); });

// ── INIT ─────────────────────────────────────────────────────────
startTypewriter('');
updateChapterTag(0);
showChapterTitle('DIANA × BTS','una historia pixel 💜');
requestAnimationFrame(render);
setTimeout(resizeCanvas, 100);

})();
</script>
